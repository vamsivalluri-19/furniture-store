{% extends "base.html" %}

{% block title %}Create Account - VR Furniture{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-bg-ornament register-ornament"></div>
    <div class="auth-card glass-panel">
        <div class="auth-header">
            <h2>Join VR Furniture</h2>
            <p>Register to explore premium handcrafted wood furniture</p>
        </div>
        
        <form method="POST" action="{{ url_for('register') }}" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-user input-icon"></i>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required autocomplete="username">
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="password" name="password" placeholder="Create a password" required autocomplete="new-password">
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block btn-large">
                <span>Create Account</span>
                <i class="fa-solid fa-user-plus"></i>
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('login') }}" class="auth-link">Sign in here</a></p>
        </div>
    </div>
</section>
{% endblock %}
